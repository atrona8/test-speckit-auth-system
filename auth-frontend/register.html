<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/auth.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>Créer un compte</h1>
      <p class="subtitle">Renseignez vos informations pour vous inscrire.</p>

      <!-- REQ-004 : Affichage des erreurs et succès -->
      <div class="error-message" id="errorMsg"></div>
      <div class="success-message" id="successMsg"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <input type="email" id="email" placeholder="vous@exemple.com" required />
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input
            type="password"
            id="password"
            placeholder="8 caractères minimum"
            minlength="8"
            required
          />
        </div>
        <button type="submit" id="submitBtn">S'inscrire</button>
      </form>

      <div class="link-row">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      // REQ-006 : Redirige si déjà connecté
      requireGuest();

      const form = document.getElementById("registerForm");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorMsg.classList.remove("visible");
        successMsg.classList.remove("visible");
        submitBtn.disabled = true;
        submitBtn.textContent = "Inscription...";

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          // REQ-001 : Inscription
          await apiRegister(email, password);
          // REQ-004 : Message de succès
          successMsg.textContent = "Compte créé ! Redirection vers la connexion...";
          successMsg.classList.add("visible");
          // REQ-006 : Redirection vers login après 1.5s
          setTimeout(() => (window.location.href = "login.html"), 1500);
        } catch (err) {
          // REQ-004 : Affichage de l'erreur
          errorMsg.textContent = err.message;
          errorMsg.classList.add("visible");
          submitBtn.disabled = false;
          submitBtn.textContent = "S'inscrire";
        }
      });
    </script>
  </body>
</html>
